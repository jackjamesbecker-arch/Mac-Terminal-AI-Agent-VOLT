<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Volt">
<meta name="theme-color" content="#000000">
<title>Volt</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23000'/%3E%3Ctext x='50' y='68' font-size='60' text-anchor='middle' fill='%2300e5ff'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E">
<style>
  :root {
    --bg: #000000;
    --bg-elevated: #0a0d12;
    --surface: #11161d;
    --border: rgba(255,255,255,0.08);
    --text: #e8edf2;
    --text-dim: #6b7785;
    --text-faint: #3d4550;
    --mono: 'SF Mono', 'JetBrains Mono', ui-monospace, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    overflow: hidden;
    overscroll-behavior: none;
  }

  #app {
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ===== LOGIN SCREEN ===== */
  #login-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 48px;
  }

  .volt-mark {
    text-align: center;
  }
  .volt-bolt {
    font-size: 56px;
    filter: drop-shadow(0 0 24px rgba(0,229,255,0.5));
    animation: pulse-glow 3s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%, 100% { filter: drop-shadow(0 0 16px rgba(0,229,255,0.4)); }
    50% { filter: drop-shadow(0 0 32px rgba(0,229,255,0.7)); }
  }
  .volt-title {
    font-family: var(--mono);
    font-size: 36px;
    font-weight: 800;
    letter-spacing: 10px;
    color: var(--accent, #00e5ff);
    margin-top: 12px;
  }
  .volt-sub {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--text-faint);
    margin-top: 8px;
    text-transform: uppercase;
  }

  .login-box {
    width: 100%;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .login-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--text-faint);
    text-align: center;
    text-transform: uppercase;
  }
  #code-input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 8px;
    text-align: center;
    color: var(--accent, #00e5ff);
    width: 100%;
    outline: none;
    transition: border-color 0.2s, transform 0.15s;
  }
  #code-input:focus { border-color: var(--accent, #00e5ff); }
  #code-input.shake { animation: shake 0.4s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-10px); }
    40%, 80% { transform: translateX(10px); }
  }
  .login-error {
    font-family: var(--mono);
    font-size: 12px;
    color: #ff4d4d;
    text-align: center;
    min-height: 16px;
  }
  #auth-btn {
    background: var(--accent, #00e5ff);
    color: #000;
    border: none;
    border-radius: 12px;
    padding: 18px;
    font-family: var(--mono);
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
  }
  #auth-btn:active { transform: scale(0.97); }

  .key-setup {
    text-align: center;
    margin-top: 8px;
  }
  .key-setup button {
    background: none;
    border: none;
    color: var(--text-faint);
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    text-decoration: underline;
  }
  #api-key-field {
    margin-top: 10px;
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    outline: none;
  }

  /* ===== MAIN APP ===== */
  #main-screen { flex: 1; display: none; flex-direction: column; min-height: 0; }
  #main-screen.active { display: flex; }

  /* Header */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  #header-title {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 15px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #header-actions { display: flex; gap: 16px; }
  #header-actions button {
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
  }

  /* Tab content area */
  #content { flex: 1; overflow: hidden; min-height: 0; position: relative; }
  .tab-panel {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    overflow: hidden;
  }
  .tab-panel.active { display: flex; }

  /* ===== CHAT TAB ===== */
  #chat-messages {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg-row { display: flex; gap: 8px; align-items: flex-start; }
  .msg-row.user { justify-content: flex-end; }
  .msg-bubble {
    max-width: 78%;
    padding: 11px 15px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.45;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .msg-row.assistant .msg-bubble {
    background: var(--surface);
    border-bottom-left-radius: 4px;
    font-family: var(--mono);
    font-size: 14px;
  }
  .msg-row.user .msg-bubble {
    background: var(--accent, #00e5ff);
    color: #000;
    border-bottom-right-radius: 4px;
    font-weight: 500;
  }
  .msg-icon {
    font-size: 11px;
    color: var(--accent, #00e5ff);
    padding-top: 8px;
  }
  .typing-dots { display: flex; gap: 4px; padding: 4px 0; }
  .typing-dots span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-faint);
    animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-4px); opacity: 1; } }

  #chat-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 32px;
    text-align: center;
  }
  #chat-empty .glyph { font-size: 40px; opacity: 0.5; }
  #chat-empty p { font-family: var(--mono); font-size: 13px; color: var(--text-faint); }

  #input-bar {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: var(--bg);
  }
  #chat-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 12px 16px;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text);
    outline: none;
    resize: none;
    max-height: 100px;
    line-height: 1.4;
  }
  #chat-input:focus { border-color: var(--accent, #00e5ff); }
  #send-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--accent, #00e5ff);
    border: none;
    color: #000;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }
  #send-btn:disabled { background: var(--text-faint); }
  #send-btn:active:not(:disabled) { transform: scale(0.92); }

  /* ===== ACTIONS TAB ===== */
  #actions-grid {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    align-content: start;
  }
  .action-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: transform 0.1s, background 0.15s;
  }
  .action-card:active { transform: scale(0.94); background: rgba(255,255,255,0.06); }
  .action-icon { font-size: 24px; }
  .action-label {
    font-family: var(--mono);
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.3px;
    color: var(--text-dim);
    text-align: center;
  }

  /* ===== TASKS TAB ===== */
  #tasks-add {
    display: flex;
    gap: 10px;
    padding: 16px;
  }
  #task-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text);
    outline: none;
  }
  #task-add-btn {
    width: 42px;
    background: var(--accent, #00e5ff);
    border: none;
    border-radius: 10px;
    color: #000;
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
  }
  #tasks-list { flex: 1; overflow-y: auto; padding: 0 16px 16px; -webkit-overflow-scrolling: touch; }
  .task-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px;
    background: var(--surface);
    border-radius: 12px;
    margin-bottom: 8px;
  }
  .task-check {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--text-faint);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    cursor: pointer;
  }
  .task-check.done {
    background: var(--accent, #00e5ff);
    border-color: var(--accent, #00e5ff);
    color: #000;
  }
  .task-text {
    flex: 1;
    font-family: var(--mono);
    font-size: 14px;
  }
  .task-text.done { color: var(--text-faint); text-decoration: line-through; }
  .task-del {
    color: var(--text-faint);
    font-size: 18px;
    cursor: pointer;
    padding: 4px;
  }
  #tasks-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 60px 32px;
    text-align: center;
  }
  #tasks-empty .glyph { font-size: 36px; opacity: 0.5; }
  #tasks-empty p { font-family: var(--mono); font-size: 12.5px; color: var(--text-faint); }

  /* ===== MEMORY TAB ===== */
  #memory-content { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }
  .mem-section-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-faint);
    text-transform: uppercase;
    margin: 16px 0 8px;
  }
  .mem-section-title:first-child { margin-top: 0; }
  .mem-row {
    background: var(--surface);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 8px;
  }
  .mem-key {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    color: var(--accent, #00e5ff);
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .mem-val {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text);
  }
  #memory-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 60px 32px;
    text-align: center;
  }
  #memory-empty .glyph { font-size: 36px; opacity: 0.5; }
  #memory-empty p { font-family: var(--mono); font-size: 12.5px; color: var(--text-faint); }

  /* ===== TAB BAR ===== */
  #tabbar {
    display: flex;
    border-top: 1px solid var(--border);
    background: var(--bg-elevated);
    padding-bottom: max(env(safe-area-inset-bottom), 8px);
    padding-top: 8px;
  }
  .tab-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    background: none;
    border: none;
    padding: 4px;
    cursor: pointer;
  }
  .tab-btn-icon { font-size: 21px; opacity: 0.4; transition: opacity 0.15s, transform 0.15s; }
  .tab-btn-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.5px;
    color: var(--text-faint);
    text-transform: uppercase;
  }
  .tab-btn.active .tab-btn-icon { opacity: 1; transform: scale(1.1); }
  .tab-btn.active .tab-btn-label { color: var(--accent, #00e5ff); }

  /* Scrollbar hide */
  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>

<div id="app">

  <!-- LOGIN SCREEN -->
  <div id="login-screen">
    <div class="volt-mark">
      <div class="volt-bolt">⚡</div>
      <div class="volt-title">VOLT</div>
      <div class="volt-sub">terminal ai agent</div>
    </div>

    <div class="login-box">
      <div class="login-label">Identity Verification</div>
      <input id="code-input" type="password" inputmode="numeric" placeholder="••••" maxlength="10" autocomplete="off">
      <div class="login-error" id="login-error"></div>
      <button id="auth-btn">Authenticate</button>

      <div class="key-setup">
        <button id="toggle-api-key">set groq api key</button>
        <input id="api-key-field" type="password" placeholder="gsk_..." style="display:none;">
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="main-screen">
    <div id="header">
      <div id="header-title"><span id="header-emoji">⚡</span> <span id="header-name">Volt</span></div>
      <div id="header-actions">
        <button id="clear-btn">Clear</button>
        <button id="logout-btn">Logout</button>
      </div>
    </div>

    <div id="content">
      <!-- CHAT -->
      <div class="tab-panel active" id="panel-chat">
        <div id="chat-messages">
          <div id="chat-empty">
            <div class="glyph">◆</div>
            <p>Systems online.<br>What can I help with?</p>
          </div>
        </div>
        <div id="input-bar">
          <textarea id="chat-input" rows="1" placeholder="Message Volt..."></textarea>
          <button id="send-btn">↑</button>
        </div>
      </div>

      <!-- ACTIONS -->
      <div class="tab-panel" id="panel-actions">
        <div id="actions-grid"></div>
      </div>

      <!-- TASKS -->
      <div class="tab-panel" id="panel-tasks">
        <div id="tasks-add">
          <input id="task-input" type="text" placeholder="Add a task...">
          <button id="task-add-btn">+</button>
        </div>
        <div id="tasks-list"></div>
      </div>

      <!-- MEMORY -->
      <div class="tab-panel" id="panel-memory">
        <div id="memory-content"></div>
      </div>
    </div>

    <div id="tabbar">
      <button class="tab-btn active" data-tab="chat">
        <span class="tab-btn-icon">⚡</span>
        <span class="tab-btn-label">Chat</span>
      </button>
      <button class="tab-btn" data-tab="actions">
        <span class="tab-btn-icon">▦</span>
        <span class="tab-btn-label">Actions</span>
      </button>
      <button class="tab-btn" data-tab="tasks">
        <span class="tab-btn-icon">✓</span>
        <span class="tab-btn-label">Tasks</span>
      </button>
      <button class="tab-btn" data-tab="memory">
        <span class="tab-btn-icon">◇</span>
        <span class="tab-btn-label">Memory</span>
      </button>
    </div>
  </div>

</div>

<script>
// ===== USERS =====
const VOLT_USERS = {
  "7474":    { name: "Jackson", color: "#00e5ff", emoji: "⚡" },
  "110583":  { name: "Jules",   color: "#b46bff", emoji: "✨" },
  "8675309": { name: "Larry",   color: "#39e07a", emoji: "👑" },
};

let currentUser = null;
let loginAttempts = 0;
let chatHistory = [];
let memory = JSON.parse(localStorage.getItem('volt_memory') || '{}');
let notes = JSON.parse(localStorage.getItem('volt_notes') || '{}');
let todos = JSON.parse(localStorage.getItem('volt_todos') || '[]');

// ===== LOGIN =====
const codeInput = document.getElementById('code-input');
const authBtn = document.getElementById('auth-btn');
const loginError = document.getElementById('login-error');
const toggleApiKey = document.getElementById('toggle-api-key');
const apiKeyField = document.getElementById('api-key-field');

apiKeyField.value = localStorage.getItem('volt_api_key') || '';
apiKeyField.addEventListener('input', () => {
  localStorage.setItem('volt_api_key', apiKeyField.value);
});

toggleApiKey.addEventListener('click', () => {
  const showing = apiKeyField.style.display !== 'none';
  apiKeyField.style.display = showing ? 'none' : 'block';
  toggleApiKey.textContent = showing ? 'set groq api key' : 'hide api key setup';
});

function attemptLogin() {
  const code = codeInput.value.trim();
  const user = VOLT_USERS[code];
  if (user) {
    currentUser = user;
    loginAttempts = 0;
    enterApp();
  } else {
    loginAttempts++;
    loginError.textContent = loginAttempts >= 3 ? 'Access denied.' : 'Unrecognized identity. Try again.';
    codeInput.classList.add('shake');
    setTimeout(() => codeInput.classList.remove('shake'), 400);
    codeInput.value = '';
  }
}

authBtn.addEventListener('click', attemptLogin);
codeInput.addEventListener('keypress', e => { if (e.key === 'Enter') attemptLogin(); });

function enterApp() {
  document.documentElement.style.setProperty('--accent', currentUser.color);
  document.getElementById('header-emoji').textContent = currentUser.emoji;
  document.getElementById('header-name').textContent = currentUser.name;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-screen').classList.add('active');
  renderTodos();
  renderMemory();
  requestNotifyPermission();
  getLocation();
}

document.getElementById('logout-btn').addEventListener('click', () => {
  currentUser = null;
  chatHistory = [];
  document.getElementById('main-screen').classList.remove('active');
  document.getElementById('login-screen').style.display = 'flex';
  codeInput.value = '';
  renderChat();
});

// ===== TAB SWITCHING =====
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
  });
});

// ===== TIME OF DAY =====
function getPeriod() {
  const h = new Date().getHours();
  if (h < 12) return 'morning';
  if (h < 17) return 'afternoon';
  if (h < 21) return 'evening';
  return 'night';
}

// ===== REAL DATA: GEOLOCATION + WEATHER =====
let cachedLocation = null;

function getLocation() {
  return new Promise((resolve) => {
    if (cachedLocation) return resolve(cachedLocation);
    if (!navigator.geolocation) return resolve(null);
    navigator.geolocation.getCurrentPosition(
      pos => {
        cachedLocation = { lat: pos.coords.latitude, lon: pos.coords.longitude };
        resolve(cachedLocation);
      },
      () => resolve(null),
      { timeout: 8000 }
    );
  });
}

async function getRealWeather() {
  const loc = await getLocation();
  if (!loc) return "Location unavailable — enable Location Services for Safari in Settings to get real weather.";
  try {
    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&current=temperature_2m,weather_code,wind_speed_10m&temperature_unit=fahrenheit`);
    const data = await res.json();
    const temp = Math.round(data.current.temperature_2m);
    const wind = Math.round(data.current.wind_speed_10m);
    const code = data.current.weather_code;
    const conditions = {
      0: 'Clear sky', 1: 'Mainly clear', 2: 'Partly cloudy', 3: 'Overcast',
      45: 'Foggy', 48: 'Foggy', 51: 'Light drizzle', 61: 'Rain', 63: 'Rain',
      65: 'Heavy rain', 71: 'Snow', 80: 'Rain showers', 95: 'Thunderstorm'
    };
    const desc = conditions[code] || 'Conditions unclear';
    return `${temp}°F, ${desc}, wind ${wind} mph`;
  } catch (e) {
    return "Weather lookup failed: " + e.message;
  }
}

// ===== REAL DATA: WEB SEARCH =====
async function realWebSearch(query) {
  try {
    const res = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`);
    const data = await res.json();
    let results = [];
    if (data.AbstractText) {
      results.push(`${data.Heading || 'Answer'}: ${data.AbstractText}`);
    }
    (data.RelatedTopics || []).slice(0, 4).forEach(t => {
      if (t.Text) results.push(t.Text);
    });
    return results.length ? results.join('\n\n') : "No results found.";
  } catch (e) {
    return "Search failed: " + e.message;
  }
}

// ===== REAL DATA: PASSWORD GENERATOR =====
function generateSecurePassword(length = 20) {
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*";
  const array = new Uint32Array(length);
  crypto.getRandomValues(array);
  let password = "";
  for (let i = 0; i < length; i++) {
    password += chars[array[i] % chars.length];
  }
  return password;
}

// ===== REAL DATA: STOCKS (via CORS proxy since Yahoo blocks direct browser calls) =====
async function realStockPrice(symbol) {
  const sym = symbol.toUpperCase();
  try {
    const url = `https://corsproxy.io/?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=1d`)}`;
    const res = await fetch(url);
    const data = await res.json();
    const meta = data.chart.result[0].meta;
    const price = meta.regularMarketPrice;
    const prev = meta.chartPreviousClose || price;
    const change = ((price - prev) / prev * 100);
    const arrow = change >= 0 ? '▲' : '▼';
    return `${sym}: $${price.toFixed(2)} ${arrow} ${Math.abs(change).toFixed(2)}%`;
  } catch (e) {
    // Fallback: try CoinGecko for crypto symbols
    const cryptoMap = { 'BTC': 'bitcoin', 'BTC-USD': 'bitcoin', 'ETH': 'ethereum', 'ETH-USD': 'ethereum', 'SOL': 'solana', 'DOGE': 'dogecoin' };
    const coinId = cryptoMap[sym];
    if (coinId) {
      try {
        const res2 = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${coinId}&vs_currencies=usd&include_24hr_change=true`);
        const data2 = await res2.json();
        const price = data2[coinId].usd;
        const change = data2[coinId].usd_24h_change || 0;
        const arrow = change >= 0 ? '▲' : '▼';
        return `${sym}: $${price.toLocaleString()} ${arrow} ${Math.abs(change).toFixed(2)}%`;
      } catch (e2) {
        return `Could not fetch ${sym}: ${e2.message}`;
      }
    }
    return `Could not fetch ${sym}: ${e.message}`;
  }
}

// ===== PUSH NOTIFICATIONS =====
async function requestNotifyPermission() {
  if (!('Notification' in window)) return false;
  if (Notification.permission === 'granted') return true;
  const perm = await Notification.requestPermission();
  return perm === 'granted';
}

function sendNotification(title, body) {
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification(title, { body, icon: 'data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Crect width=\'100\' height=\'100\' fill=\'%23000\'/%3E%3Ctext x=\'50\' y=\'68\' font-size=\'60\' text-anchor=\'middle\' fill=\'%2300e5ff\'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E' });
  }
}

async function dispatchWebTool(name, args) {
  if (name === 'get_weather') return await getRealWeather();
  if (name === 'web_search') return await realWebSearch(args.query);
  if (name === 'get_stock') return await realStockPrice(args.symbol);
  if (name === 'send_notification') {
    sendNotification(args.title, args.body);
    return `✓ Notification sent: ${args.title}`;
  }
  if (name === 'generate_password') {
    const pw = generateSecurePassword(args.length || 20);
    return `Generated password: ${pw}`;
  }
  return "Unknown tool.";
}

// ===== GROQ CHAT =====
async function callGroq(messages) {
  const apiKey = localStorage.getItem('volt_api_key');
  if (!apiKey) {
    return "Groq API key not set. Tap 'set groq api key' on the login screen.";
  }

  const memStr = Object.keys(memory).length
    ? "\n\nMemory:\n" + Object.entries(memory).map(([k,v]) => `- ${k}: ${v}`).join('\n')
    : "";

  const systemPrompt = `You are Volt, a Jarvis-style AI agent on ${currentUser.name}'s iPhone. It is currently the ${getPeriod()}.

Personality:
- Calm authority, dry wit, formal but not stiff
- Address ${currentUser.name} occasionally but naturally
- Never say "Great!", "Sure!", "Absolutely!"
- Understated confidence — "Done.", "Handled.", "As expected."
- Detect sarcasm and match energy with dry wit
- Never say "As you wish, Sir" outside of APEX Protocol

You have real tools: get_weather (uses GPS), web_search (real results), get_stock (real prices), send_notification (real push notification), generate_password (cryptographically secure). Use them whenever relevant — never guess or fake this data when a tool can get the real answer. You don't have access to Mac-only features like iMessage, Apple Music control, or shell commands in this web version — be upfront if those are needed and suggest the desktop Volt agent.${memStr}`;

  let convo = [{ role: 'system', content: systemPrompt }, ...messages];

  try {
    while (true) {
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${apiKey}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          model: 'meta-llama/llama-4-scout-17b-16e-instruct',
          max_tokens: 1024,
          messages: convo,
          tools: WEB_TOOLS
        })
      });
      const data = await res.json();
      if (data.error) return `Error: ${data.error.message}`;

      const msg = data.choices[0].message;

      if (!msg.tool_calls || msg.tool_calls.length === 0) {
        return msg.content;
      }

      convo.push(msg);

      for (const tc of msg.tool_calls) {
        const args = JSON.parse(tc.function.arguments || '{}');
        const result = await dispatchWebTool(tc.function.name, args);
        convo.push({ role: 'tool', tool_call_id: tc.id, content: result });
      }
    }
  } catch (e) {
    return `Connection error: ${e.message}`;
  }
}

// ===== CHAT UI =====
const chatMessages = document.getElementById('chat-messages');
const chatInput = document.getElementById('chat-input');
const sendBtn = document.getElementById('send-btn');
const chatEmpty = document.getElementById('chat-empty');

function renderChat() {
  chatMessages.innerHTML = '';
  if (chatHistory.length === 0) {
    chatMessages.appendChild(chatEmpty);
    return;
  }
  chatHistory.forEach(msg => {
    const row = document.createElement('div');
    row.className = `msg-row ${msg.role}`;
    if (msg.role === 'assistant') {
      const icon = document.createElement('div');
      icon.className = 'msg-icon';
      icon.textContent = '◆';
      row.appendChild(icon);
    }
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = msg.content;
    row.appendChild(bubble);
    chatMessages.appendChild(row);
  });
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'msg-row assistant';
  row.id = 'typing-row';
  row.innerHTML = `<div class="msg-icon">◆</div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  chatMessages.appendChild(row);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}
function hideTyping() {
  const row = document.getElementById('typing-row');
  if (row) row.remove();
}

async function sendMessage(text) {
  if (!text || !text.trim()) return;
  chatHistory.push({ role: 'user', content: text.trim() });
  renderChat();
  chatInput.value = '';
  chatInput.style.height = 'auto';
  sendBtn.disabled = true;
  showTyping();

  const reply = await callGroq(chatHistory);

  hideTyping();
  chatHistory.push({ role: 'assistant', content: reply });
  renderChat();
  sendBtn.disabled = false;

  // Auto-memory for goodnight/morning
  const lower = text.toLowerCase();
  if (lower.includes('goodnight') || lower.includes('good night')) {
    memory['last_goodnight'] = new Date().toLocaleString();
    localStorage.setItem('volt_memory', JSON.stringify(memory));
    renderMemory();
  }
}

sendBtn.addEventListener('click', () => sendMessage(chatInput.value));
chatInput.addEventListener('keypress', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage(chatInput.value);
  }
});
chatInput.addEventListener('input', () => {
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 100) + 'px';
});

document.getElementById('clear-btn').addEventListener('click', () => {
  chatHistory = [];
  renderChat();
});

// ===== TASKS =====
const taskInput = document.getElementById('task-input');
const taskAddBtn = document.getElementById('task-add-btn');
const tasksList = document.getElementById('tasks-list');

function saveTodos() {
  localStorage.setItem('volt_todos', JSON.stringify(todos));
}

function renderTodos() {
  tasksList.innerHTML = '';
  if (todos.length === 0) {
    tasksList.innerHTML = `<div id="tasks-empty"><div class="glyph">✓</div><p>No tasks. Either very productive<br>or very behind.</p></div>`;
    return;
  }
  todos.forEach(todo => {
    const row = document.createElement('div');
    row.className = 'task-row';
    row.innerHTML = `
      <div class="task-check ${todo.done ? 'done' : ''}">${todo.done ? '✓' : ''}</div>
      <div class="task-text ${todo.done ? 'done' : ''}">${todo.text}</div>
      <div class="task-del">×</div>
    `;
    row.querySelector('.task-check').addEventListener('click', () => {
      todo.done = !todo.done;
      saveTodos();
      renderTodos();
    });
    row.querySelector('.task-del').addEventListener('click', () => {
      todos = todos.filter(t => t.id !== todo.id);
      saveTodos();
      renderTodos();
    });
    tasksList.appendChild(row);
  });
}

function addTask() {
  const text = taskInput.value.trim();
  if (!text) return;
  todos.push({ id: Date.now(), text, done: false });
  saveTodos();
  renderTodos();
  taskInput.value = '';
}

taskAddBtn.addEventListener('click', addTask);
taskInput.addEventListener('keypress', e => { if (e.key === 'Enter') addTask(); });

function renderMemory() {
  const container = document.getElementById('memory-content');
  const memKeys = Object.keys(memory);

  if (memKeys.length === 0 && noteKeys.length === 0) {
    container.innerHTML = `<div id="memory-empty"><div class="glyph">◇</div><p>Nothing in memory yet.<br>Tell Volt something to remember.</p></div>`;
    return;
  }

  let html = '';
  if (memKeys.length) {

      html += `<div class="mem-row"><div class="mem-key">${k}</div><div class="mem-val">${memory[k]}</div></div>`;

  if (noteKeys.length) {

    noteKeys.forEach(k => {
      html += `<div class="mem-row"><div class="mem-key">${k}</div><div class="mem-val">${notes[k]}</div></div>`;

}
